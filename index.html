<!doctype html>
<html lang="ru">
	<head>
		<title>Blast Game</title>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
	</head>
	<body>
		<div class="loading-screen" id="loading-screen">
			<div class="loading-screen__spinner"></div>
		</div>
		<div id="app"></div>
		<script type="module" src="/src/app.ts"></script>
	</body>
</html>

<template id="game-blast">
	<section class="view game-blast-container">
		<div class="view__content game-blast-container__content">
			<div class="game-blast-container__progress-block progress-block">
				<div class="progress-block__movements-counter movements-counter">
					<p class="movements-counter__text" id="movements-counter-text"></p>
				</div>
				<div class="progress-block__points-counter points-counter">
					<p class="points-counter__title">Очки:</p>
					<p class="points-counter__result" id="points-counter-result"></p>
				</div>
			</div>

			<div
				class="game-blast-container__canvas-container canvas-container"
				id="canvas-container"
			></div>

			<div class="game-blast-container__boosters-container boosters-container">
				<p class="boosters-container__title">Бустеры</p>

				<ul class="boosters-container__list">
					<li class="boosters-container__item">
						<button
							class="boosters-container__booster booster"
							id="booster-teleport"
							type="button"
						>
							<span class="booster__icon booster__icon--teleport"></span>
							<p class="booster__counter" id="booster-counter-teleport"></p>
						</button>
					</li>
					<li class="boosters-container__item">
						<button
							class="boosters-container__booster booster"
							id="booster-bomb"
							type="button"
						>
							<span class="booster__icon booster__icon--bomb"></span>
							<p class="booster__counter" id="booster-counter-bomb"></p>
						</button>
					</li>
				</ul>
			</div>
		</div>

		<dialog class="win-modal" id="win-modal">
			<div class="win-modal__wrapper">
				<h2 class="win-modal__title">Ты выиграл!</h2>
				<button class="win-modal__button" id="win-modal-button" type="button">
					Новый уровень
				</button>
			</div>
		</dialog>

		<dialog class="loss-modal" id="loss-modal">
			<div class="loss-modal__wrapper">
				<h2 class="loss-modal__title">Ты проиграл :(</h2>
				<button class="loss-modal__button" id="loss-modal-button" type="button">
					Попробовать снова
				</button>
			</div>
		</dialog>
	</section>
</template>
