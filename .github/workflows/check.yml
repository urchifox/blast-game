name: Project check

on:
  pull_request:

jobs:
  check:
    name: Check

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run checks
        run: npm run check
        env:
          FORCE_COLOR: true